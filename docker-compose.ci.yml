version: '3.8'

# CI/CD environment configuration
# Use this for automated testing and deployment pipelines

services:
  db:
    image: postgres:15
    container_name: medicare_ci_db
    environment:
      POSTGRES_DB: medicare_ci_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cipassword
    volumes:
      - ci_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Different port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medicare_ci_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ci_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicare_ci_app
    environment:
      DATABASE_URL: postgresql://postgres:cipassword@db:5432/medicare_ci_db
      JWT_SECRET: ci-jwt-secret-key
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3002
      NODE_ENV: test
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    ports:
      - "3002:3000"  # Different port to avoid conflicts
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ci_uploads_data:/app/uploads
      - /app/node_modules
    networks:
      - ci_network
    command: npm run test

volumes:
  ci_postgres_data:
    driver: local
  ci_uploads_data:
    driver: local

networks:
  ci_network:
    driver: bridge
